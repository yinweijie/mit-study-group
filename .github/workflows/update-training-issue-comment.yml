name: Update training issue comment

on:
  push:
    branches:
      - main

jobs:
  update-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Append this push summary to datenlord/training issue comment
        uses: actions/github-script@v9
        env:
          TARGET_OWNER: datenlord
          TARGET_REPO: training
          TARGET_ISSUE_NUMBER: "71"
          TARGET_COMMENT_ID: "3877884203"
        with:
          github-token: ${{ secrets.GH_ISSUE_TOKEN }}
          script: |
            const owner = process.env.TARGET_OWNER;
            const repo = process.env.TARGET_REPO;
            const issue_number = Number(process.env.TARGET_ISSUE_NUMBER);
            const comment_id = Number(process.env.TARGET_COMMENT_ID);

            const { data: comment } = await github.rest.issues.getComment({
              owner,
              repo,
              comment_id,
            });

            const commits = context.payload.commits ?? [];
            const compareUrl = context.payload.compare;
            const branch = context.ref.replace('refs/heads/', '');
            const repoFullName = context.payload.repository.full_name;
            const pusher = context.payload.pusher?.name ?? context.actor;
            const pushedAt = new Date().toISOString();

            const summarizeFiles = (files) => {
              const counts = {
                added: 0,
                modified: 0,
                renamed: 0,
                removed: 0,
                copied: 0,
                other: 0,
              };
              let additions = 0;
              let deletions = 0;

              for (const file of files ?? []) {
                if (Object.hasOwn(counts, file.status)) {
                  counts[file.status] += 1;
                } else {
                  counts.other += 1;
                }
                additions += file.additions ?? 0;
                deletions += file.deletions ?? 0;
              }

              const extraStatuses = [
                counts.copied > 0 ? `copied: ${counts.copied}` : undefined,
                counts.other > 0 ? `other: ${counts.other}` : undefined,
              ].filter(Boolean);

              return [
                `files: added ${counts.added}, modified ${counts.modified}, renamed ${counts.renamed}, removed ${counts.removed}`,
                ...extraStatuses,
                `lines: +${additions}/-${deletions}`,
              ].join('; ');
            };

            const commitLines = commits.length > 0
              ? (await Promise.all(commits.map(async (commit) => {
                  const sha = commit.id.slice(0, 7);
                  const firstLine = commit.message.split('\n')[0];
                  const url = commit.url ?? `https://github.com/${repoFullName}/commit/${commit.id}`;

                  try {
                    const { data } = await github.rest.repos.getCommit({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: commit.id,
                    });
                    return `- [\`${sha}\`](${url}) ${firstLine} _(${summarizeFiles(data.files)})_`;
                  } catch (error) {
                    core.warning(`Could not load file summary for ${commit.id}: ${error.message}`);
                    return `- [\`${sha}\`](${url}) ${firstLine} _(file summary unavailable)_`;
                  }
                }))).join('\n')
              : `- [\`${context.sha.slice(0, 7)}\`](https://github.com/${repoFullName}/commit/${context.sha}) push event without commit details`;

            const section = [
              '',
              '<!-- auto-update:mit-study-group-push -->',
              `### ${repoFullName} push update`,
              '',
              `- Branch: \`${branch}\``,
              `- Pusher: @${pusher}`,
              `- Time: ${pushedAt}`,
              compareUrl ? `- Compare: ${compareUrl}` : undefined,
              '',
              commitLines,
            ].filter(Boolean).join('\n');

            const body = `${comment.body ?? ''}\n${section}`;

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id,
              body,
            });

            core.info(`Updated https://github.com/${owner}/${repo}/issues/${issue_number}#issuecomment-${comment_id}`);
